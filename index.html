    /* ══════════════════════════════════════
       나침반 퀴즈 컴포넌트
    ══════════════════════════════════════ */
    function CompassStage({ stage, goNext, ClueBar, MapPin }) {
      const COMPASS_ANSWER = ['W','E','N','W','N'];
      const arrowMap = { N:'↑', E:'→', S:'↓', W:'←' };
      const compassSteps = [
        { angle: -90 }, { angle: 90 }, { angle: 360 }, { angle: 270 }, { angle: 720 }
      ];
      const [userDirs, setUserDirs] = useState([]);
      const [compassMsg, setCompassMsg] = useState('');
      const [compassOk, setCompassOk] = useState(false);
      const [showMap, setShowMap] = useState(false);
      const needleRef = useRef(null);
      const playedRef = useRef(false);

      const playCompass = useCallback(() => {
        const needle = needleRef.current;
        if (!needle) return;
        needle.style.transition = 'none';
        needle.style.transform = 'rotate(0deg)';
        compassSteps.forEach((s, i) => {
          setTimeout(() => {
            needle.style.transition = 'transform 0.8s cubic-bezier(.4,0,.2,1)';
            needle.style.transform = `rotate(${s.angle}deg)`;
          }, i * 1200 + 50);
        });
      }, []);

      useEffect(() => {
        if (!playedRef.current) { playedRef.current = true; setTimeout(playCompass, 400); }
      }, []);

      const addDir = (d) => {
        if (compassOk) return;
        if (userDirs.length >= COMPASS_ANSWER.length) return;
        setUserDirs(prev => [...prev, d]);
        setCompassMsg('');
      };
      const delDir = () => { setUserDirs(prev => prev.slice(0,-1)); setCompassMsg(''); };
      const checkDir = () => {
        if (userDirs.length < COMPASS_ANSWER.length) { setCompassMsg(`방향이 ${COMPASS_ANSWER.length}개여야 해요!`); return; }
        const ok = userDirs.every((d,i) => d === COMPASS_ANSWER[i]);
        if (ok) { setCompassOk(true); setCompassMsg('정답이에요! 🎉'); }
        else { setCompassMsg('다시 한번 생각해봐요!'); setTimeout(() => setUserDirs([]), 800); }
      };

      /* ── 정답 후: 약도 페이지 ── */
      if (showMap) {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <ClueBar />
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-brown-light py-4 px-4 text-center">
                  <h2 className="text-lg font-extrabold text-white flex items-center justify-center gap-2">
                    🗺️ 골목 길 안내
                  </h2>
                </div>
                <div className="p-5 flex flex-col items-center gap-4">
                  <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-3 w-full text-center">
                    <p className="text-sm font-bold text-amber-700">나침반이 알려준 경로예요!</p>
                    <p className="text-xs text-amber-600 mt-1">← → ↑ ← ↑ 순서로 골목을 따라가보세요</p>
                  </div>
                  <AlleyMap />
                  <button
                    onClick={goNext}
                    className="w-full bg-brown-dark hover:bg-brown-light text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base"
                  >
                    길을 따라가보자! 🐾
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ── 나침반 입력 페이지 ── */
      return (
        <div className="min-h-screen flex flex-col items-center py-6 px-4">
          <div className="w-full max-w-md">
            <ClueBar />
            <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
              <div className="bg-brown-light py-4 px-4 text-center">
                <h2 className="text-lg font-extrabold text-white flex items-center justify-center gap-2">
                  <MapPin /> {stage.location}
                </h2>
              </div>
              <div className="p-5 flex flex-col items-center gap-5">

                {/* 나침반 */}
                <div className="flex flex-col items-center gap-3">
                  <p className="text-xs font-bold text-gray-400 tracking-widest uppercase">나침반 바늘이 가리키는 방향을 순서대로 입력하세요</p>
                  <svg viewBox="0 0 220 220" width="190" height="190">
                    <circle cx="110" cy="110" r="104" fill="white" stroke="#ccc" strokeWidth="1"/>
                    <circle cx="110" cy="110" r="90" fill="none" stroke="#eee" strokeWidth="0.5"/>
                    <text x="110" y="26" textAnchor="middle" fontSize="15" fontWeight="500" fill="#333">N</text>
                    <text x="110" y="208" textAnchor="middle" fontSize="15" fill="#999">S</text>
                    <text x="202" y="115" textAnchor="middle" fontSize="15" fill="#999">E</text>
                    <text x="18" y="115" textAnchor="middle" fontSize="15" fill="#999">W</text>
                    <line x1="110" y1="40" x2="110" y2="180" stroke="#eee" strokeWidth="0.5"/>
                    <line x1="40" y1="110" x2="180" y2="110" stroke="#eee" strokeWidth="0.5"/>
                    <g ref={needleRef} style={{transformOrigin:'110px 110px', transform:'rotate(0deg)'}}>
                      <polygon points="110,42 104,110 116,110" fill="#E24B4A"/>
                      <polygon points="110,178 104,110 116,110" fill="#aaa"/>
                    </g>
                    <circle cx="110" cy="110" r="6" fill="white" stroke="#aaa" strokeWidth="1"/>
                  </svg>
                  <button
                    onClick={playCompass}
                    className="text-sm px-6 py-2.5 rounded-2xl border border-gray-200 bg-white text-brown-dark font-bold hover:bg-gray-50 transition-colors"
                  >
                    다시보기
                  </button>
                </div>

                <div className="w-full h-px bg-gray-100"/>

                {/* 방향 입력 */}
                <div className="flex flex-col items-center gap-4 w-full">

                  {/* 5칸 슬롯 */}
                  <div className="flex flex-col items-center gap-1 w-full">
                    <p className="text-xs text-gray-400 font-bold">방향을 <span className="text-brown-dark">5번</span> 입력하세요</p>
                    <div className="flex gap-2 justify-center mt-1">
                      {COMPASS_ANSWER.map((_, i) => (
                        <div key={i} className={`w-11 h-11 rounded-xl border-2 flex items-center justify-center text-xl font-bold transition-all ${
                          userDirs[i]
                            ? 'border-brown-dark bg-s-beige text-brown-dark'
                            : i === userDirs.length
                              ? 'border-brown-light bg-white text-gray-300 animate-pulse'
                              : 'border-gray-200 bg-gray-50 text-gray-200'
                        }`}>
                          {userDirs[i] ? arrowMap[userDirs[i]] : (i === userDirs.length ? '·' : '□')}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{display:'grid', gridTemplateColumns:'repeat(3,56px)', gridTemplateRows:'repeat(3,56px)', gap:'8px'}}>
                    <div/><button onClick={()=>addDir('N')} className="rounded-xl border border-gray-200 bg-white text-brown-dark text-2xl font-bold hover:bg-gray-50 active:scale-95 transition-all">↑</button><div/>
                    <button onClick={()=>addDir('W')} className="rounded-xl border border-gray-200 bg-white text-brown-dark text-2xl font-bold hover:bg-gray-50 active:scale-95 transition-all">←</button>
                    <div className="rounded-full border border-gray-200 flex items-center justify-center"><div className="w-2 h-2 rounded-full bg-gray-300"/></div>
                    <button onClick={()=>addDir('E')} className="rounded-xl border border-gray-200 bg-white text-brown-dark text-2xl font-bold hover:bg-gray-50 active:scale-95 transition-all">→</button>
                    <div/><button onClick={()=>addDir('S')} className="rounded-xl border border-gray-200 bg-white text-brown-dark text-2xl font-bold hover:bg-gray-50 active:scale-95 transition-all">↓</button><div/>
                  </div>

                  <div className="flex gap-2 w-full max-w-[200px]">
                    <button onClick={delDir} className="flex-1 py-2.5 rounded-2xl border border-gray-200 bg-gray-50 text-gray-500 text-sm font-bold hover:bg-gray-100 transition-colors">지우기</button>
                    <button onClick={checkDir} className="flex-1 py-2.5 rounded-2xl bg-brown-dark text-white text-sm font-bold hover:bg-brown-light transition-colors">확인</button>
                  </div>

                  {compassMsg && (
                    <p className={`text-sm font-bold ${compassOk ? 'text-green-600' : 'text-red-500'}`}>{compassMsg}</p>
                  )}

                  {compassOk && (
                    <button onClick={() => setShowMap(true)} className="w-full bg-brown-dark hover:bg-brown-light text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base mt-2">
                      길을 확인해보자! 🗺️
                    </button>
                  )}
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       메인 앱
    ══════════════════════════════════════ */
    function App() {
      // 세션 저장 복원
      const savedStep = (() => { try { const v = sessionStorage.getItem('somak_step'); return v !== null ? parseInt(v) : -1; } catch(e) { return -1; } })();
      const savedClues = (() => { try { const v = sessionStorage.getItem('somak_clues'); return v ? JSON.parse(v) : []; } catch(e) { return []; } })();

      const [step, setStep] = useState(savedStep);
      const [inputValue, setInputValue] = useState("");
      const [hintLevel, setHintLevel] = useState(0);
      const [errorMsg, setErrorMsg] = useState("");
      const [isSuccess, setIsSuccess] = useState(false);
      const [collectedClues, setCollectedClues] = useState(savedClues);
      const [showClueAnimation, setShowClueAnimation] = useState(false);

      const stage = step >= 0 ? stages[step] : null;

      // 퀴즈 총 수 / 현재 퀴즈 번호 계산
      const totalQuizzes = stages.filter(s => s.type === "quiz").length;
      const currentQuizNumber = stage?.quizNumber || null;

      const goNext = () => {
        setInputValue("");
        setHintLevel(0);
        setErrorMsg("");
        setStep(prev => {
          const next = prev + 1;
          try { sessionStorage.setItem('somak_step', next); } catch(e) {}
          return next;
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!inputValue.trim() || !stage) return;

        const normalizedInput = inputValue.replace(/\s+/g, '').toLowerCase();
        const isCorrect = stage.answer.some(ans =>
          ans.replace(/\s+/g, '').toLowerCase() === normalizedInput
        );

        if (isCorrect) {
          setIsSuccess(true);
          setErrorMsg("");
          setTimeout(() => {
            setIsSuccess(false);
            goNext();
          }, 1200);
        } else {
          setErrorMsg("정답이 아니에요. 현장과 리플릿을 다시 확인해보세요!");
          setTimeout(() => setErrorMsg(""), 3000);
        }
      };

      // 단서 조각 수집
      useEffect(() => {
        if (stage?.type === "clue" && stage.clueFragment) {
          setShowClueAnimation(true);
          setCollectedClues(prev => {
            if (prev.find(c => c.index === stage.clueIndex)) return prev;
            const next = [...prev, { letter: stage.clueFragment, index: stage.clueIndex }];
            try { sessionStorage.setItem('somak_clues', JSON.stringify(next)); } catch(e) {}
            return next;
          });
        } else {
          setShowClueAnimation(false);
        }
      }, [step]);

      /* ─── 인트로 화면 ─── */
      if (step === -1) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-5">
            <div className="bg-white rounded-[2rem] shadow-xl w-full max-w-md overflow-hidden border-4 border-brown-light">
              <div className="bg-brown-dark py-10 px-6 text-center">
                <p className="text-s-beige text-sm font-bold mb-2 tracking-widest">야외 방탈출</p>
                <h1 className="text-3xl font-extrabold text-white mb-2 tracking-tight">소막마을 탐험대</h1>
                <p className="text-s-beige font-semibold text-base opacity-90">누렁이의 잃어버린 친구를 찾아서</p>
              </div>
              <div className="p-6 text-center bg-white">
                <div className="bg-s-beige bg-opacity-40 rounded-2xl p-5 mb-6 text-left">
                  <p className="text-gray-700 font-medium leading-relaxed text-sm text-center mb-4">
                    소막마을 곳곳을 탐험하며<br/>
                    <strong className="text-brown-dark">현장의 단서</strong>와 <strong className="text-s-olive">탐험 키트</strong>를<br/>
                    조합하여 미션을 해결하세요!
                  </p>
                  <div className="space-y-3">
                    <div className="flex items-center gap-3">
                      <span className="flex-shrink-0 w-7 h-7 bg-brown-dark text-white rounded-full flex items-center justify-center font-extrabold text-xs">1</span>
                      <p className="text-xs font-semibold text-gray-600">화면의 스토리를 따라가세요</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="flex-shrink-0 w-7 h-7 bg-brown-dark text-white rounded-full flex items-center justify-center font-extrabold text-xs">2</span>
                      <p className="text-xs font-semibold text-gray-600">현장에서 단서를 찾으세요</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="flex-shrink-0 w-7 h-7 bg-s-olive text-white rounded-full flex items-center justify-center font-extrabold text-xs">3</span>
                      <p className="text-xs font-semibold text-gray-600">리플릿으로 정답을 찾아보세요</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="flex-shrink-0 w-7 h-7 bg-amber-500 text-white rounded-full flex items-center justify-center font-extrabold text-xs">4</span>
                      <p className="text-xs font-semibold text-gray-600">단서 조각을 모아 최종 퍼즐을 완성하세요</p>
                    </div>
                  </div>
                </div>
                <button
                  onClick={() => { setStep(0); try { sessionStorage.setItem('somak_step', 0); } catch(e) {} }}
                  className="w-full bg-brown-dark hover:bg-brown-light text-white text-lg font-bold py-4 px-6 rounded-2xl transition-all shadow-md active:scale-95"
                >
                  탐험 시작하기
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ─── 범위 초과 방어 ─── */
      if (step >= stages.length) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-5">
            <div className="bg-white rounded-[2rem] shadow-xl w-full max-w-md p-8 text-center border-4 border-s-olive">
              <h2 className="text-2xl font-extrabold text-brown-dark mb-4">탐험 완료!</h2>
              <p className="text-gray-600 leading-relaxed">키오스크에서 최종 퍼즐을 풀어주세요!</p>
            </div>
          </div>
        );
      }

      /* ─── 단서 조각 바 ─── */
      const ClueBar = () => (
        <div className="flex justify-center mb-3">
          <div className="bg-white rounded-full shadow-sm border border-s-beige px-4 py-2 flex items-center gap-1.5">
            <span className="text-xs font-bold text-gray-400 mr-1">단서</span>
            {[1,2,3,4,5,6,7].map(i => {
              const found = collectedClues.find(c => c.index === i);
              return (
                <div key={i} className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs font-extrabold transition-all ${
                  found 
                    ? 'bg-amber-400 text-white shadow-sm' 
                    : 'bg-gray-100 text-gray-300'
                }`}>
                  {found ? found.letter : '?'}
                </div>
              );
            })}
          </div>
        </div>
      );

      /* ─── 캐릭터 말풍선 ─── */
      const CharacterBubble = ({ character, children }) => (
        <div className="mb-5 animate-fade-in">
          <div className="flex items-center gap-2 mb-2 px-1">
            <CowFace name={character} />
            <span className="text-sm font-extrabold text-brown-dark">{character}</span>
          </div>
          <div className="bg-s-beige bg-opacity-40 rounded-2xl rounded-tl-md p-5">
            {children}
          </div>
        </div>
      );

      /* ═══ type: story ═══ */
      if (stage.type === "story") {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <ClueBar />
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-brown-light py-4 px-4 text-center">
                  <h2 className="text-lg font-extrabold text-white flex items-center justify-center gap-2">
                    <MapPin /> {stage.location}
                  </h2>
                </div>
                <div className="p-5">
                  {/* 이미지 */}
                  {stage.image && (
                    <div className="mb-4 rounded-2xl overflow-hidden border-2 border-brown-light">
                      <img
                        src={stage.image}
                        alt="장소 이미지"
                        className="w-full h-auto object-contain"
                      />
                    </div>
                  )}
                  <CharacterBubble character={stage.character}>
                    <StoryText 
                      text={stage.story} 
                      className="text-brown-dark font-semibold leading-relaxed text-[15px] text-center"
                    />
                  </CharacterBubble>
                  <button
                    onClick={goNext}
                    className="w-full bg-brown-dark hover:bg-brown-light text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base"
                  >
                    {stage.button}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ═══ type: quiz ═══ */
      if (stage.type === "quiz") {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <ClueBar />
              <div className="flex justify-center mb-3">
                <div className="bg-white px-4 py-1.5 rounded-full shadow-sm border border-s-beige font-extrabold text-brown-dark text-sm tracking-wide">
                  미션 {stage.quizNumber} / {totalQuizzes}
                </div>
              </div>
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-s-olive py-4 px-4 text-center">
                  <h2 className="text-lg font-extrabold text-white flex items-center justify-center gap-2">
                    <MapPin /> {stage.location}
                  </h2>
                </div>
                <div className="p-5">
                  {/* 스토리 */}
                  <div className="bg-s-beige bg-opacity-30 rounded-2xl p-4 mb-4">
                    <StoryText 
                      text={stage.story} 
                      className="text-brown-dark font-semibold leading-relaxed text-[14px] text-center"
                    />
                  </div>

                  {/* 안내판 이미지 */}
                  {stage.image && (
                    <div className="mb-4 rounded-2xl overflow-hidden border-2 border-brown-light">
                      <img
                        src={stage.image}
                        alt="안내판"
                        className="w-full h-auto object-contain"
                      />
                    </div>
                  )}

                  {/* 리플릿 안내 */}
                  {stage.leafletRef && (
                    <div className="mb-4 bg-white border-2 border-dashed border-s-olive rounded-2xl p-4 text-center">
                      <div className="flex items-center justify-center gap-2 text-s-olive mb-1">
                        <Leaflet />
                        <span className="text-xs font-extrabold tracking-wide">리플릿을 펼쳐주세요</span>
                      </div>
                      <p className="text-brown-dark text-xl font-extrabold">{stage.leafletRef}</p>
                    </div>
                  )}

                  {/* 질문 */}
                  <div className="mb-4">
                    <div className="bg-gray-50 py-3 px-4 rounded-xl border border-gray-200">
                      <StoryText 
                        text={`Q. ${stage.question}`}
                        className="text-gray-800 font-bold text-[14px] leading-relaxed text-center"
                      />
                    </div>
                  </div>

                  {/* 정답 입력 */}
                  <form onSubmit={handleSubmit} className="space-y-3">
                    <input
                      type="text"
                      value={inputValue}
                      onChange={(e) => setInputValue(e.target.value)}
                      placeholder="정답을 입력하세요"
                      disabled={isSuccess}
                      className="w-full bg-white border-2 border-s-beige text-center text-lg font-bold p-3.5 rounded-2xl focus:outline-none focus:border-brown-light transition-colors shadow-sm"
                    />

                    {errorMsg && (
                      <p className="text-red-500 text-xs font-bold text-center animate-fade-in">{errorMsg}</p>
                    )}

                    <div className="flex gap-2">
                      <button
                        type="button"
                        onClick={() => setHintLevel(hintLevel === 0 ? 1 : 0)}
                        className={`flex-shrink-0 p-3.5 rounded-2xl transition-colors flex items-center justify-center shadow-sm ${
                          hintLevel > 0 ? 'bg-s-olive text-white' : 'bg-s-beige text-brown-dark hover:bg-brown-light hover:text-white'
                        }`}
                      >
                        <Lightbulb />
                      </button>
                      <button
                        type="submit"
                        disabled={isSuccess}
                        className={`flex-1 text-white font-bold p-3.5 rounded-2xl transition-all text-base shadow-sm ${
                          isSuccess ? 'bg-s-olive' : 'bg-brown-dark hover:bg-brown-light'
                        }`}
                      >
                        {isSuccess ? '정답! 👏' : '정답 확인'}
                      </button>
                    </div>
                  </form>

                  {/* 힌트 */}
                  {hintLevel > 0 && stage.hints && (
                    <div className="mt-4 bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 text-center animate-fade-in">
                      {stage.hints.slice(0, hintLevel).map((h, i) => (
                        <div key={i} className={`${i > 0 ? 'mt-3 pt-3 border-t-2 border-amber-200 border-dashed' : ''}`}>
                          <p className={`font-bold text-[14px] leading-relaxed ${
                            i === stage.hints.length - 1 && hintLevel >= stage.hints.length
                              ? 'text-red-500' : 'text-brown-dark'
                          }`}>{h}</p>
                        </div>
                      ))}
                      {hintLevel < stage.hints.length && (
                        <button
                          onClick={() => setHintLevel(prev => prev + 1)}
                          className="mt-3 bg-brown-light text-white text-xs font-bold py-2 px-4 rounded-full hover:bg-brown-dark transition-colors"
                        >
                          다음 힌트 보기
                        </button>
                      )}
                    </div>
                  )}
                </div>
              </div>

              {/* 정답 연출 */}
              {isSuccess && (
                <div className="fixed inset-0 bg-s-olive bg-opacity-95 flex items-center justify-center z-50">
                  <div className="text-center animate-slide-up">
                    <div className="w-20 h-20 border-4 border-white rounded-full flex items-center justify-center mx-auto mb-4 bg-s-olive shadow-2xl">
                      <CheckIcon />
                    </div>
                    <h2 className="text-white font-black text-3xl tracking-widest">정답!</h2>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ═══ type: compass ═══ */
      if (stage.type === "compass") {
        return <CompassStage stage={stage} goNext={goNext} ClueBar={ClueBar} MapPin={MapPin} />;
      }

      /* ═══ type: clue ═══ */
      if (stage.type === "clue") {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <ClueBar />
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-amber-400 py-4 px-4 text-center">
                  <h2 className="text-lg font-extrabold text-white flex items-center justify-center gap-2">
                    🧩 단서 조각 발견!
                  </h2>
                </div>
                <div className="p-5">
                  {/* 단서 조각 연출 */}
                  <div className="flex justify-center mb-5">
                    <div className="w-20 h-20 bg-amber-400 rounded-2xl flex items-center justify-center shadow-lg animate-slide-up">
                      <span className="text-white text-4xl font-black">{stage.clueFragment}</span>
                    </div>
                  </div>
                  <p className="text-center text-sm font-bold text-amber-600 mb-5">
                    {stage.clueIndex}번째 단서 조각을 획득했어요!
                  </p>

                  {/* 캐릭터 대사 */}
                  <CharacterBubble character={stage.character}>
                    <StoryText 
                      text={stage.story} 
                      className="text-brown-dark font-semibold leading-relaxed text-[15px] text-center"
                    />
                  </CharacterBubble>

                  <button
                    onClick={goNext}
                    className="w-full bg-brown-dark hover:bg-brown-light text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base"
                  >
                    {stage.button}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ═══ type: move ═══ */
      if (stage.type === "move") {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <ClueBar />
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div className="bg-brown-light bg-opacity-70 py-3 px-4 text-center">
                  <h2 className="text-base font-extrabold text-white flex items-center justify-center gap-2">
                    <FootPrint /> {stage.location}
                  </h2>
                </div>
                <div className="p-5">
                  {/* 이동 참고 이미지 */}
                  {stage.moveImage && (
                    <div className="mb-4 rounded-2xl overflow-hidden shadow-md border-2 border-brown-light">
                      <img src={stage.moveImage} alt="길 안내" className="w-full h-auto" />
                    </div>
                  )}
                  <CharacterBubble character={stage.character}>
                    <StoryText 
                      text={stage.story} 
                      className="text-brown-dark font-semibold leading-relaxed text-[15px] text-center"
                    />
                  </CharacterBubble>

                  <button
                    onClick={goNext}
                    className="w-full bg-brown-light hover:bg-brown-dark text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base"
                  >
                    {stage.button}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ═══ type: ending ═══ */
      if (stage.type === "ending") {
        return (
          <div className="min-h-screen flex flex-col items-center py-6 px-4">
            <div className="w-full max-w-md">
              <div className="bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-s-olive">
                <div className="bg-s-olive py-6 px-4 text-center">
                  <h2 className="text-xl font-extrabold text-white mb-1">탐험 완료!</h2>
                  <p className="text-white text-sm opacity-80">모든 단서 조각을 모았어요!</p>
                </div>
                <div className="p-5">
                  {/* 모은 단서 조각 표시 */}
                  <div className="flex justify-center gap-2 mb-5">
                    {stage.collectedClues.map((letter, i) => (
                      <div key={i} className="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center shadow-md animate-slide-up" style={{animationDelay: `${i * 0.1}s`}}>
                        <span className="text-white text-xl font-black">{letter}</span>
                      </div>
                    ))}
                  </div>

                  <CharacterBubble character={stage.character}>
                    <StoryText 
                      text={stage.story} 
                      className="text-brown-dark font-semibold leading-relaxed text-[15px] text-center"
                    />
                  </CharacterBubble>

                  <button
                    onClick={() => { try { sessionStorage.removeItem('somak_step'); sessionStorage.removeItem('somak_clues'); } catch(e) {} window.location.reload(); }}
                    className="w-full bg-s-olive hover:bg-brown-dark text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-md text-base"
                  >
                    {stage.button}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
